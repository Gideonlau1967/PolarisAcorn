<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <script>
        const supabaseUrl = 'https://ajkhkmrxwfpqwywujhfu.supabase.co';
        const supabaseKey = 'sb_publishable_N0TtoWxyljFXRp3boJV1tg_o5yoliT8';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        async function test() {
            const testData = {
                id: crypto.randomUUID(),
                "Client Name": "Test Client",
                "Jan 25": "1"
            };

            const { data, error } = await supabase.from('Client').upsert([testData]);
            
            if (error) {
                console.error("Error saving:", error);
                document.body.innerHTML += `<p style="color:red">Error saving: ${error.message}</p>`;
                if (error.details) {
                     document.body.innerHTML += `<p style="color:red">Details: ${error.details}</p>`;
                }
            } else {
                console.log("Success:", data);
                document.body.innerHTML += `<p style="color:green">Success! Saved to Client table</p>`;
            }

            const { data: readData, error: readError } = await supabase.from('Client').select('*').limit(1);
            if(readError) {
                 document.body.innerHTML += `<p style="color:red">Error reading: ${readError.message}</p>`;
            } else {
                document.body.innerHTML += `<pre>${JSON.stringify(readData, null, 2)}</pre>`;
            }
        }
        test();
    </script>
</body>
</html>
