        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error(msg, url, lineNo, columnNo, error);
            fetch('/log_error', {
                method: 'POST',
                body: JSON.stringify({msg, url, lineNo, columnNo, error: error ? error.stack : ''})
            });
            return false;
        };
