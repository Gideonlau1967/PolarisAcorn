<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <script>
        const supabaseUrl = 'https://ajkhkmrxwfpqwywujhfu.supabase.co';
        const supabaseKey = 'sb_publishable_N0TtoWxyLjFXRp3boJV1tg_o5yo9gS5W70c1DEDfA20EBD19';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        async function test() {
            const { data, error } = await supabase.from('client_data').select('*').limit(1);
            if (error) {
                console.error("Error connecting:", error);
                document.body.innerHTML += `<p style="color:red">Error: ${error.message}</p>`;
            } else {
                console.log("Success:", data);
                document.body.innerHTML += `<p style="color:green">Success! Connected to client_data</p>`;
            }
        }
        test();
    </script>
</body>
</html>
